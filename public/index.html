<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Busca do Sistema - Mobile</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Share+Tech+Mono&display=swap');
        body { background-color: #090a0f; color: #f1f5f9; font-family: 'Share Tech Mono', monospace; }
        .neon-border { border: 1px solid rgba(0, 243, 255, 0.3); box-shadow: 0 0 10px rgba(0, 243, 255, 0.1); }
        .neon-text { color: #00f3ff; text-shadow: 0 0 5px rgba(0, 243, 255, 0.5); }
    </style>
</head>
<body class="p-4 min-h-screen flex flex-col justify-between max-w-md mx-auto">

    <header class="mb-4 text-center">
        <h1 class="text-xl font-bold tracking-widest neon-text uppercase">SISTEMA DE BUSCA</h1>
        <p class="text-xs text-gray-400 mt-1">Mapeamento Geral de Funcionalidades</p>
    </header>

    <div class="sticky top-2 z-50 mb-6">
        <input 
            type="text" 
            id="input-busca" 
            onkeyup="filtrarFuncionalidades()" 
            placeholder="🔍 Digite para buscar..." 
            class="w-full bg-gray-900 border border-[#00f3ff] rounded-lg px-4 py-3 text-sm text-white placeholder-gray-500 focus:outline-none focus:ring-2 focus:ring-[#00f3ff] shadow-lg"
            autocomplete="off"
        >
    </div>

    <main id="lista-cards" class="space-y-4 flex-1"></main>

    <footer class="mt-8 text-center text-[10px] text-gray-500 py-4">
        Parceiro de Programação // Interface Mobile
    </footer>

    <script>
        const funcionalidades = [
            { titulo: "Projeto Lumen: O Espelho Digital", categoria: "Front-end / Biometria", status: "Ativo", descricao: "Interface cibernética com leitor de câmera, simulação de varredura biométrica (scanlines) e ambiente de chat." },
            { titulo: "Desativação de Cache (No-Cache)", categoria: "Backend / Express", status: "Ativo", descricao: "Configuração que impede o navegador de guardar arquivos antigos em memória." },
            { titulo: "Integração Microlink Meta", categoria: "API / Módulo Meta", status: "Pronto", descricao: "Rota /api/meta para extração de metadados de links em tempo real." },
            { titulo: "Aplicativo de Memorando e Rota", categoria: "Painel / Controle", status: "Concluído", descricao: "Painel interativo com linha do tempo de conquistas e próximas diretrizes." },
            { titulo: "O Caminho e a Verdade", categoria: "Página Interativa", status: "Concluído", descricao: "Interface com 3 pilares conceituais que alteram o conteúdo da tela ao clicar." }
        ];

        function renderizarCards(itens) {
            const container = document.getElementById('lista-cards');
            container.innerHTML = '';
            if (itens.length === 0) {
                container.innerHTML = '<p class="text-center text-xs text-gray-500 py-8">Nenhum resultado encontrado.</p>';
                return;
            }
            itens.forEach((item, index) => {
                const card = document.createElement('div');
                card.className = 'bg-gray-900 bg-opacity-80 p-4 rounded-lg neon-border transition-all duration-300';
                card.innerHTML = `
                    <div class="flex justify-between items-start cursor-pointer" onclick="alternarDetalhes(${index})">
                        <div>
                            <span class="text-[10px] text-purple-400 font-bold uppercase tracking-wider">${item.categoria}</span>
                            <h3 class="text-sm font-bold text-white mt-1">${item.titulo}</h3>
                        </div>
                        <span class="text-[10px] px-2 py-1 bg-green-900 text-green-300 rounded font-bold">${item.status}</span>
                    </div>
                    <div id="detalhe-${index}" class="hidden mt-3 pt-3 border-t border-gray-800 text-xs text-gray-300 leading-relaxed">
                        ${item.descricao}
                    </div>
                `;
                container.appendChild(card);
            });
        }

        function filtrarFuncionalidades() {
            const texto = document.getElementById('input-busca').value.toLowerCase();
            const filtrados = funcionalidades.filter(item => 
                item.titulo.toLowerCase().includes(texto) ||
                item.categoria.toLowerCase().includes(texto) ||
                item.descricao.toLowerCase().includes(texto)
            );
            renderizarCards(filtrados);
        }

        function alternarDetalhes(index) {
            const detalhe = document.getElementById(`detalhe-${index}`);
            if (detalhe) detalhe.classList.toggle('hidden');
        }

        window.onload = () => renderizarCards(funcionalidades);
    </script>
</body>
</html>
